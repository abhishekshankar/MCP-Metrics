name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: analytics
          POSTGRES_PASSWORD: analytics
          POSTGRES_DB: analytics_mcp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: >-
          ruff check
          backend/src/config.py
          backend/src/database.py
          backend/src/api/routes/health.py
          backend/src/services/google_auth.py
          backend/src/auth
          backend/src/models
          backend/alembic
          backend/tests/test_health.py
          backend/tests/test_google_auth.py
          backend/tests/test_models.py
          cli/analytics_cli.py

      - name: Apply migrations
        run: cd backend && alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg2://analytics:analytics@localhost:5432/analytics_mcp
          MOCK_GOOGLE_APIS: "true"
          PYTHONPATH: backend/src
        run: pytest backend/tests/test_health.py backend/tests/test_google_auth.py backend/tests/test_models.py -v --tb=short
