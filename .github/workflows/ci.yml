name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: analytics
          POSTGRES_PASSWORD: analytics
          POSTGRES_DB: analytics_mcp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      API_SECRET_KEY: test-secret-key-for-ci
      ADMIN_API_KEY: test-admin-key-for-ci
      READONLY_API_KEY: test-readonly-key-for-ci
      MOCK_GOOGLE_APIS: "true"
      PYTHONPATH: backend/src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Lint
        run: ruff check backend/src/ backend/tests/ cli/

      - name: Apply migrations
        run: cd backend && alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg2://analytics:analytics@localhost:5432/analytics_mcp
        run: pytest backend/tests/ -v --tb=short

      - name: Type check Web UI
        run: |
          cd web-ui
          npm ci
          npx tsc --noEmit
