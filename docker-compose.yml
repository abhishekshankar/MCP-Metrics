services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics_mcp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics_mcp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://analytics:analytics@db:5432/analytics_mcp
      APP_ENV: development
      LOG_LEVEL: info
      MOCK_GOOGLE_APIS: "true"
      PYTHONPATH: /app/backend/src
      # Development API keys (change for production!)
      API_SECRET_KEY: dev-api-secret-key-change-in-production
      ADMIN_API_KEY: dev-admin-key-change-in-production
      READONLY_API_KEY: dev-readonly-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/backend/src:ro
      - ./cli:/app/cli:ro

volumes:
  postgres_data:
